name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Free Pascal
        run: |
          sudo apt-get update
          sudo apt-get install -y fp-compiler fp-units-fcl

      - name: Verify Free Pascal version
        run: test "$(fpc -iV)" = "3.2.2"

      - name: Build and run tests
        run: |
          cd tests
          mkdir -p lib/ci
          fpc -B -FcUTF8 -Fu../src -FUlib/ci TestRunner.lpr
          if ! ./TestRunner -a --format=plain > test-output.txt; then
            cat test-output.txt
            exit 1
          fi
          tail -n 20 test-output.txt

      - name: Build examples
        run: |
          cd examples
          mkdir -p lib/ci
          for file in *.lpr; do
            fpc -B -FcUTF8 -Fu../src -FUlib/ci "$file"
          done

      - name: Test README quick start from a source archive
        run: |
          archive_dir=$(mktemp -d)
          git archive HEAD | tar -x -C "$archive_dir"
          cd "$archive_dir"
          cat > my_program.lpr <<'EOF'
          program hello_mathlib;
          {$mode objfpc}{$H+}
          uses ProbabilityLib.Distributions;
          begin
            Writeln('P(Z <= 1.96) = ', TProbabilityKit.NormalCDF(1.96, 0, 1):0:6);
          end.
          EOF
          mkdir -p lib
          fpc -Fusrc -FUlib my_program.lpr
          ./my_program

  windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Lazarus and Free Pascal
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: stable
          with-cache: false

      - name: Verify Free Pascal version
        shell: pwsh
        run: |
          $version = (fpc -iV).Trim()
          Write-Host "Free Pascal version: $version"
          if ($version -ne '3.2.2') {
            throw "Expected FPC 3.2.2, found $version"
          }

      - name: Build and run tests
        shell: pwsh
        run: |
          Set-Location tests
          New-Item -ItemType Directory -Force -Path lib/ci | Out-Null
          fpc -B -FcUTF8 -Fu../src -FUlib/ci TestRunner.lpr
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./TestRunner.exe -a --format=plain
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build examples
        shell: pwsh
        run: |
          Set-Location examples
          New-Item -ItemType Directory -Force -Path lib/ci | Out-Null
          Get-ChildItem *.lpr | ForEach-Object {
            fpc -B -FcUTF8 -Fu../src -FUlib/ci $_.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
