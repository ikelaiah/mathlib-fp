name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Free Pascal
        run: |
          sudo apt-get update
          sudo apt-get install -y fp-compiler fp-units-fcl

      - name: Verify Free Pascal version
        run: test "$(fpc -iV)" = "3.2.2"

      - name: Build and run tests
        run: |
          cd tests
          mkdir -p lib/ci
          fpc -B -FcUTF8 -Fu../src -FUlib/ci TestRunner.lpr
          if ! ./TestRunner -a --format=plain > test-output.txt; then
            cat test-output.txt
            exit 1
          fi
          tail -n 20 test-output.txt

      - name: Build and run examples
        run: |
          cd examples
          mkdir -p lib/ci
          for file in *.lpr; do
            fpc -B -FcUTF8 -Fu../src -FUlib/ci "$file"
            "./${file%.lpr}" > /dev/null
          done

      - name: Compile representative benchmarks
        run: |
          mkdir -p benchmarks/lib/ci
          fpc -B -O3 -FcUTF8 -Fusrc -FUbenchmarks/lib/ci \
            -FEbenchmarks/lib/ci benchmarks/BenchmarkRunner.lpr

      - name: Test README quick start from a source archive
        run: |
          archive_dir=$(mktemp -d)
          git archive HEAD | tar -x -C "$archive_dir"
          cd "$archive_dir"
          cat > my_program.lpr <<'EOF'
          program hello_mathlib;
          {$mode objfpc}{$H+}
          uses ProbabilityLib.Distributions;
          begin
            Writeln('P(Z <= 1.96) = ', TProbabilityKit.NormalCDF(1.96, 0, 1):0:6);
          end.
          EOF
          mkdir -p lib
          fpc -Fusrc -FUlib my_program.lpr
          ./my_program

  windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Lazarus and Free Pascal
        uses: gcarreno/setup-lazarus@3ee9d77e0c771b37c1069f218cb68bd5ce7c30fe # v3
        with:
          lazarus-version: "4.0"
          with-cache: false

      - name: Install Win32 cross compiler
        shell: pwsh
        run: |
          $installerName = `
            'lazarus-4.0-fpc-3.2.2-cross-i386-win32-win64.exe'
          $downloadUrl = `
            'https://download.lazarus-ide.org/' + `
            'Lazarus%20Windows%2064%20bits/Lazarus%204.0/' + `
            $installerName
          $expectedHash = `
            '6A4E3D37D32E3B356F70385BDF5146EBE07E0A0530359AB2FB5CE20CC58BEEAF'
          $installer = Join-Path $env:RUNNER_TEMP $installerName

          $fpcPath = (Get-Command fpc).Source
          $binRoot = Split-Path (Split-Path $fpcPath -Parent) -Parent
          $versionRoot = Split-Path $binRoot -Parent
          $fpcRoot = Split-Path $versionRoot -Parent
          $lazarusRoot = Split-Path $fpcRoot -Parent

          Invoke-WebRequest -Uri $downloadUrl -OutFile $installer
          $actualHash = (Get-FileHash -Algorithm SHA256 $installer).Hash
          if ($actualHash -ne $expectedHash) {
            throw "Win32 cross-compiler checksum mismatch: $actualHash"
          }

          $install = Start-Process -FilePath $installer -ArgumentList @(
            '/VERYSILENT'
            '/SUPPRESSMSGBOXES'
            '/NORESTART'
            '/SP-'
            "/DIR=$lazarusRoot"
          ) -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            throw "Win32 cross-compiler installer exited with $($install.ExitCode)"
          }

          $fpc386 = Join-Path $binRoot 'i386-win32/fpc.exe'
          $ppc386 = Join-Path $binRoot 'i386-win32/ppc386.exe'
          if (-not (Test-Path $fpc386) -or -not (Test-Path $ppc386)) {
            throw "Win32 cross compiler was not installed under $binRoot"
          }
          $version386 = (& $fpc386 '-iV').Trim()
          if ($version386 -ne '3.2.2') {
            throw "Expected Win32 FPC 3.2.2, found $version386"
          }

      - name: Verify Free Pascal version
        shell: pwsh
        run: |
          $version = (fpc -iV).Trim()
          Write-Host "Free Pascal version: $version"
          if ($version -ne '3.2.2') {
            throw "Expected FPC 3.2.2, found $version"
          }

      - name: Build and run tests
        shell: pwsh
        run: |
          Set-Location tests
          New-Item -ItemType Directory -Force -Path lib/ci | Out-Null
          & fpc '-B' '-FcUTF8' '-Fu../src' '-FUlib/ci' 'TestRunner.lpr'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & ./TestRunner.exe '-a' '--format=plain'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build and run examples
        shell: pwsh
        run: |
          Set-Location examples
          New-Item -ItemType Directory -Force -Path lib/ci | Out-Null
          Get-ChildItem *.lpr | ForEach-Object {
            & fpc '-B' '-FcUTF8' '-Fu../src' '-FUlib/ci' $_.FullName
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            $executable = Join-Path $_.DirectoryName ($_.BaseName + '.exe')
            & $executable | Out-Null
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Compile representative benchmarks
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path benchmarks/lib/ci | Out-Null
          & fpc '-B' '-O3' '-FcUTF8' '-Fusrc' '-FUbenchmarks/lib/ci' `
            '-FEbenchmarks/lib/ci' 'benchmarks/BenchmarkRunner.lpr'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Lazarus package (Win64 and Win32)
        shell: pwsh
        run: |
          & lazbuild '--build-all' 'packages/lazarus/mathlib_fp.lpk'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $fpcPath = (Get-Command fpc).Source
          $binRoot = Split-Path (Split-Path $fpcPath -Parent) -Parent
          $ppc386 = Join-Path $binRoot 'i386-win32/ppc386.exe'
          $fpc386 = Join-Path $binRoot 'i386-win32/fpc.exe'
          if (-not (Test-Path $ppc386) -or -not (Test-Path $fpc386)) {
            throw "Win32 compiler toolchain not found under $binRoot"
          }
          $versionRoot = Split-Path $binRoot -Parent
          $fpcRoot = Split-Path $versionRoot -Parent
          $lazarusRoot = Split-Path $fpcRoot -Parent
          $packagerUnits = Join-Path $lazarusRoot 'packager/units/i386-win32'
          New-Item -ItemType Directory -Force `
            -Path packages/lazarus/lib/ci-i386 | Out-Null
          & $ppc386 '-B' '-MObjFPC' '-Scghi' '-O2' '-FcUTF8' '-Fusrc' `
            '-Fupackages/lazarus' "-Fu$packagerUnits" `
            '-FUpackages/lazarus/lib/ci-i386' `
            'packages/lazarus/mathlib_fp.pas'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          New-Item -ItemType Directory -Force `
            -Path tests/lib/ci-i386 | Out-Null
          & $fpc386 '-B' '-O2' '-FcUTF8' '-Fusrc' `
            '-FUtests/lib/ci-i386' '-FEtests/lib/ci-i386' `
            'tests/TestRunner.lpr'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & ./tests/lib/ci-i386/TestRunner.exe '-a' '--format=plain'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
